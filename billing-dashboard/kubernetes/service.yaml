apiVersion: v1
kind: Service
metadata:
  name: billing-backend
spec:
  type: ClusterIP
  selector:
    app: billing-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: billing-frontend
spec:
  type: ClusterIP
  selector:
    app: billing-frontend
  ports:
    - port: 80
      targetPort: 80
